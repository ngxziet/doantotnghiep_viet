<svg xmlns="http://www.w3.org/2000/svg" width="820" height="580" viewBox="0 0 820 580" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1f3b57"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1a7f37"/>
    </marker>
    <marker id="arrowR" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b3261e"/>
    </marker>
    <marker id="dimA" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M8,0 L0,3 L8,6 Z" fill="#555"/>
    </marker>
    <marker id="dimB" markerWidth="10" markerHeight="10" refX="1" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="820" height="580" fill="#ffffff"/>

  <text x="410" y="34" font-size="19" font-weight="bold" text-anchor="middle" fill="#11202e">Hình 2.4: Mô hình động học xe vi sai (differential drive)</text>

  <!-- ===== Hệ trục toàn cục X-Y ===== -->
  <line x1="80" y1="510" x2="780" y2="510" stroke="#11202e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="80" y1="510" x2="80" y2="60" stroke="#11202e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="788" y="515" font-size="16" font-weight="bold" fill="#11202e">X</text>
  <text x="72" y="52" font-size="16" font-weight="bold" fill="#11202e">Y</text>
  <text x="62" y="528" font-size="14" fill="#11202e">O</text>

  <!-- ===== Toạ độ x, y của tâm xe ===== -->
  <line x1="450" y1="290" x2="450" y2="510" stroke="#888" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="80"  y1="290" x2="450" y2="290" stroke="#888" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- kích thước x -->
  <line x1="80" y1="528" x2="450" y2="528" stroke="#555" stroke-width="1" marker-start="url(#dimA)" marker-end="url(#dimB)"/>
  <text x="262" y="544" font-size="15" text-anchor="middle" fill="#555" font-style="italic">x</text>
  <!-- kích thước y -->
  <line x1="60" y1="510" x2="60" y2="290" stroke="#555" stroke-width="1" marker-start="url(#dimA)" marker-end="url(#dimB)"/>
  <text x="46" y="404" font-size="15" text-anchor="middle" fill="#555" font-style="italic">y</text>

  <!-- ===== Đường tham chiếu ngang tại tâm + cung góc theta ===== -->
  <line x1="450" y1="290" x2="575" y2="290" stroke="#11202e" stroke-width="1" stroke-dasharray="5 4"/>
  <path d="M 512 290 A 62 62 0 0 0 503.7 259.0" fill="none" stroke="#11202e" stroke-width="1.5"/>
  <text x="527" y="276" font-size="16" fill="#11202e" font-style="italic">&#952;</text>

  <!-- ===== Xe (nhóm xoay theo heading 30deg) ===== -->
  <g transform="translate(450,290) rotate(-30)">
    <!-- b: kích thước khoảng cách 2 bánh (vẽ phía sau xe) -->
    <line x1="0" y1="-50" x2="-118" y2="-50" stroke="#aaa" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="0" y1="50"  x2="-118" y2="50"  stroke="#aaa" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="-110" y1="-50" x2="-110" y2="50" stroke="#555" stroke-width="1" marker-start="url(#dimA)" marker-end="url(#dimB)"/>

    <!-- trục bánh (axle) kéo dài tới ICC -->
    <line x1="0" y1="66" x2="0" y2="-232" stroke="#b3261e" stroke-width="1" stroke-dasharray="5 4"/>

    <!-- thân xe -->
    <rect x="-62" y="-34" width="124" height="68" rx="10" fill="#dCE8F5" stroke="#1f3b57" stroke-width="2"/>

    <!-- 2 bánh -->
    <rect x="-26" y="-66" width="52" height="16" rx="3" fill="#2b2b2b"/>
    <rect x="-26" y="50"  width="52" height="16" rx="3" fill="#2b2b2b"/>

    <!-- mũi tên vận tốc / hướng chạy v -->
    <line x1="0" y1="0" x2="122" y2="0" stroke="#1f3b57" stroke-width="2.5" marker-end="url(#arrow)"/>

    <!-- quãng đi mỗi bánh dL (ngắn) / dR (dài) -> rẽ về phía bánh trái -->
    <line x1="26" y1="-58" x2="64"  y2="-58" stroke="#1a7f37" stroke-width="2.5" marker-end="url(#arrowG)"/>
    <line x1="26" y1="58"  x2="104" y2="58"  stroke="#1a7f37" stroke-width="2.5" marker-end="url(#arrowG)"/>

    <!-- R: bán kính quay từ ICC tới tâm -->
    <line x1="0" y1="0" x2="0" y2="-232" stroke="#b3261e" stroke-width="0" />
    <!-- ICC -->
    <circle cx="0" cy="-232" r="4.5" fill="#b3261e"/>

    <!-- cung quỹ đạo tâm xe quanh ICC -->
    <path d="M 0 0 A 232 232 0 0 0 96 -20.6" fill="none" stroke="#b3261e" stroke-width="1.5" stroke-dasharray="6 5"/>

    <!-- omega_z: chiều quay -->
    <path d="M 34 0 A 34 34 0 0 0 24 -24" fill="none" stroke="#7a3fb3" stroke-width="2" marker-end="url(#arrowG)"/>

    <!-- tâm xe -->
    <circle cx="0" cy="0" r="4.5" fill="#1f3b57"/>
  </g>

  <!-- ===== Nhãn upright (đặt theo toạ độ toàn cục) ===== -->
  <text x="460" y="312" font-size="15" fill="#1f3b57">(x, y)</text>

  <!-- v / hướng chạy -->
  <text x="556" y="222" font-size="16" fill="#1f3b57" font-style="italic">v</text>
  <text x="556" y="240" font-size="12" fill="#1f3b57">(hướng chạy)</text>

  <!-- bánh trái + dL -->
  <text x="372" y="232" font-size="14" fill="#11202e">Bánh trái</text>
  <text x="486" y="200" font-size="15" fill="#1a7f37" font-style="italic">d<tspan baseline-shift="sub" font-size="11">L</tspan></text>

  <!-- bánh phải + dR -->
  <text x="470" y="360" font-size="14" fill="#11202e">Bánh phải</text>
  <text x="576" y="284" font-size="15" fill="#1a7f37" font-style="italic">d<tspan baseline-shift="sub" font-size="11">R</tspan></text>

  <!-- b -->
  <text x="330" y="360" font-size="15" fill="#555" font-style="italic">b</text>
  <text x="300" y="378" font-size="11" fill="#777">(wheel base)</text>

  <!-- R -->
  <text x="400" y="188" font-size="15" fill="#b3261e" font-style="italic">R</text>

  <!-- ICC -->
  <text x="206" y="92" font-size="14" fill="#b3261e">ICC (tâm quay tức thời)</text>

  <!-- omega -->
  <text x="470" y="246" font-size="14" fill="#7a3fb3" font-style="italic">&#969;<tspan baseline-shift="sub" font-size="10">z</tspan></text>

  <!-- ===== Ghi chú công thức ===== -->
  <rect x="582" y="424" width="224" height="116" fill="#fafafa" stroke="#ccc" stroke-width="1" rx="6"/>
  <g font-size="13" fill="#333" font-style="italic">
    <text x="596" y="448">d = (d<tspan baseline-shift="sub" font-size="10">L</tspan> + d<tspan baseline-shift="sub" font-size="10">R</tspan>) / 2</text>
    <text x="596" y="472">&#969;<tspan baseline-shift="sub" font-size="10">z</tspan> = (d<tspan baseline-shift="sub" font-size="10">R</tspan> &#8722; d<tspan baseline-shift="sub" font-size="10">L</tspan>) / b</text>
    <text x="596" y="496">x += d &#183; cos(&#952;<tspan baseline-shift="sub" font-size="10">mid</tspan>)</text>
    <text x="596" y="520">y += d &#183; sin(&#952;<tspan baseline-shift="sub" font-size="10">mid</tspan>)</text>
  </g>
</svg>
